name: Secure Workflow Demo

on:
  push:
  workflow_dispatch:

env:
  APP_NAME: "GitHub Actions Demo App"
  APP_ENV: "development"

jobs:
  secure-job:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Print normal environment variables
        run: |
          echo "App Name: $APP_NAME"
          echo "App Environment: $APP_ENV"

      - name: Use secret safely
        env:
          API_KEY: ${{ secrets.MY_API_KEY }}
        run: |
          echo "Secret is available, but we will not print it."
          echo "This is the safe way to use secrets."

      - name: Simple security reminder
        run: |
          echo "Never hardcode passwords in workflow files."
          echo "Use GitHub Secrets for sensitive values."
